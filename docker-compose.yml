services:
  nginx:
    image: nginx:alpine
    container_name: boxshare_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - boxshare-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: boxshare_frontend
    environment:
      - VITE_API_URL=https://192.168.8.112:3000
    networks:
      - boxshare-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: boxshare_backend
    environment:
      - NODE_ENV=production
      - ANNOUNCED_IP=192.168.8.112
    ports:
      - "3000:3000"
      - "4443:4443/udp"
      - "4443:4443/tcp"
    networks:
      - boxshare-network
    restart: unless-stopped

networks:
  boxshare-network:
    driver: bridge
